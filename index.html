<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaijtech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --fg: #f0ede8;
    --muted: #555550;
    --accent: #c8f060;
    --border: #1e1e1a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 128px;
  }

  .grid-lines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 80px 80px;
    opacity: 0.4;
  }

  main {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: clamp(1.5rem, 4vw, 3rem);
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    opacity: 0;
    animation: fade-in 0.8s ease forwards 0.1s;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: clamp(0.8rem, 1.5vw, 0.95rem);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--fg);
    text-decoration: none;
  }

  .logo span {
    color: var(--accent);
  }

  .status {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ff3333;
    animation: pulse 2s ease-in-out infinite;
  }

  .hero {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(2rem, 6vw, 6rem) 0;
    max-width: 900px;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fade-up 0.8s ease forwards 0.3s;
  }

  h1 {
    font-weight: 200;
    font-size: clamp(2.8rem, 7vw, 6rem);
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--fg);
    opacity: 0;
    animation: fade-up 0.8s ease forwards 0.5s;
  }

  h1 em {
    font-style: normal;
    color: var(--accent);
  }

  .sub {
    margin-top: 2.5rem;
    font-size: clamp(0.9rem, 1.5vw, 1rem);
    color: var(--muted);
    font-weight: 300;
    max-width: 420px;
    line-height: 1.7;
    opacity: 0;
    animation: fade-up 0.8s ease forwards 0.7s;
  }

  footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    opacity: 0;
    animation: fade-in 0.8s ease forwards 1s;
  }

  .footer-left {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    line-height: 1.8;
  }

  .corner-mark {
    width: 40px;
    height: 40px;
    border-right: 1px solid var(--muted);
    border-bottom: 1px solid var(--muted);
    opacity: 0.3;
  }

  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @media (max-width: 600px) {
    html, body { overflow: auto; }
    .corner-mark { display: none; }
  }
</style>
</head>
<body>
<div class="grain"></div>
<div class="grid-lines"></div>
<main>
  <header>
    <a class="logo" href="#">Jaij<span>tech</span></a>
    <div class="status">Próximamente</div>
  </header>

  <section class="hero">
    <p class="eyebrow">En construcción</p>
    <h1>Desarrollo de<br>software a medida<br>para <em>empresas</em></h1>
    <p class="sub">Especialistas en crear soluciones para potenciar la productividad de tu empresa.</p>
  </section>

  <footer>
    <div class="footer-left">
      <div>© 2026 Jaijtech</div>
      <div>Madrid, España</div>
    </div>
    <div class="corner-mark"></div>
  </footer>
</main>
</body>
</html>
